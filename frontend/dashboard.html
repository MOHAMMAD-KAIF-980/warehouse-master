<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvMaster Pro | Warehouse Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .section { display: none !important; }
        .section.active { display: block !important; }
        .active-link { background-color: #2563eb !important; color: white !important; }
    </style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden font-sans">

    <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col p-6 shadow-xl">
        <div class="text-2xl font-bold text-blue-400 mb-10 flex items-center">
            <i class="fas fa-boxes-stacked mr-3"></i>INV-MASTER
        </div>
        <nav class="space-y-2 flex-1">
            <button onclick="showSection('inventory-section')" id="nav-inv" class="nav-btn w-full text-left p-3 rounded-lg hover:bg-slate-800 transition flex items-center">
                <i class="fas fa-chart-pie mr-3 w-5"></i>Dashboard
            </button>
            <button onclick="showSection('suppliers-section')" id="nav-supp" class="nav-btn w-full text-left p-3 rounded-lg hover:bg-slate-800 transition flex items-center">
                <i class="fas fa-truck-field mr-3 w-5"></i>Suppliers
            </button>
            <button onclick="exportInventory()" class="w-full text-left p-3 rounded-lg hover:bg-green-900 text-green-400 mt-10 transition flex items-center font-bold">
                <i class="fas fa-file-export mr-3 w-5"></i>Export CSV
            </button>
        </nav>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        
        <div id="inventory-section" class="section active">
            <div id="lowStockAlert" class="hidden mb-6 p-4 bg-red-100 border-l-4 border-red-500 rounded-lg flex items-center justify-between shadow-sm">
                <div class="flex items-center text-red-800">
                    <i class="fas fa-triangle-exclamation mr-3 text-xl"></i>
                    <div>
                        <p class="font-bold text-sm">Critical Inventory Alert!</p>
                        <p class="text-xs">Kuch items ka stock 10 se kam hai.</p>
                    </div>
                </div>
                <button onclick="filterLowStock()" class="bg-red-600 text-white px-4 py-1.5 rounded-lg text-xs font-bold hover:bg-red-700 transition">View Items</button>
            </div>

            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Warehouse Overview</h1>
                <button onclick="toggleModal('productModal')" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-xl shadow-lg font-bold transition">
                    + Add Product
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-2xl shadow-sm border-l-8 border-blue-500">
                    <p class="text-slate-400 text-xs font-bold uppercase">Total Items</p>
                    <h2 id="stat-total" class="text-4xl font-black mt-1 text-slate-800">0</h2>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border-l-8 border-yellow-500">
                    <p class="text-slate-400 text-xs font-bold uppercase">Low Stock</p>
                    <h2 id="stat-low" class="text-4xl font-black text-yellow-600 mt-1">0</h2>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border-l-8 border-red-500">
                    <p class="text-slate-400 text-xs font-bold uppercase">Out of Stock</p>
                    <h2 id="stat-out" class="text-4xl font-black text-red-600 mt-1">0</h2>
                </div>
            </div>

            <div class="flex flex-wrap items-center gap-4 mb-6 bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                <div class="relative flex-1 min-w-[200px]">
                    <i class="fas fa-search absolute left-3 top-3 text-slate-400"></i>
                    <input type="text" id="searchBox" placeholder="Search by name or SKU..." class="w-full pl-10 pr-4 py-2 border rounded-xl outline-none focus:ring-2 focus:ring-blue-400 transition">
                </div>
                <div class="flex gap-2">
                    <button onclick="fetchInventory()" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl text-xs font-bold transition">All Items</button>
                    <button onclick="sortByPrice('high')" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl text-xs font-bold transition">Price: High to Low</button>
                    <button onclick="sortByPrice('low')" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl text-xs font-bold transition">Price: Low to High</button>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-md border border-slate-100 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-slate-500 text-[10px] font-black uppercase tracking-widest">
                        <tr>
                            <th class="p-5">Product Name</th>
                            <th class="p-5">SKU</th>
                            <th class="p-5 text-center">Stock</th>
                            <th class="p-5">Price</th>
                            <th class="p-5 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-table" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </div>

        <div id="suppliers-section" class="section">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Suppliers Directory</h1>
                <button onclick="toggleModal('supplierModal')" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-xl shadow-lg font-bold transition">
                    + Add Supplier
                </button>
            </div>
            <div class="bg-white rounded-2xl shadow-md border border-slate-100 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-slate-500 text-[10px] font-black uppercase tracking-widest border-b">
                        <tr>
                            <th class="p-5">Company / Email</th>
                            <th class="p-5">Phone No.</th>
                            <th class="p-5">Specialty</th>
                            <th class="p-5 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="supplier-table" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="productModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl transform transition-all">
            <h2 class="text-2xl font-bold mb-6 text-slate-800">Add New Stock</h2>
            <form id="productForm" class="space-y-4">
                <input type="text" id="pName" placeholder="Product Name" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required>
                <input type="text" id="pSku" placeholder="SKU Code" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required>
                <input type="text" id="pCat" placeholder="Category (Electronics, Furniture etc.)" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required>
                <div class="flex gap-4">
                    <input type="number" id="pQty" placeholder="Qty" class="w-1/2 p-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required>
                    <input type="number" id="pPrice" placeholder="Price (₹)" class="w-1/2 p-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div class="flex justify-end gap-3 pt-6">
                    <button type="button" onclick="toggleModal('productModal')" class="text-slate-400 font-bold hover:text-slate-600 transition">Cancel</button>
                    <button type="submit" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 shadow-lg">Save Item</button>
                </div>
            </form>
        </div>
    </div>

    <div id="supplierModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl">
            <h2 class="text-2xl font-bold mb-6 text-indigo-700">Register Supplier</h2>
            <form id="supplierForm" class="space-y-4">
                <input type="text" id="sName" placeholder="Company Name" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" required>
                <input type="text" id="sContact" placeholder="Contact Number" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" required>
                <input type="email" id="sEmail" placeholder="Email Address" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" required>
                <input type="text" id="sCat" placeholder="Category Specialty" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" required>
                <div class="flex justify-end gap-3 pt-6">
                    <button type="button" onclick="toggleModal('supplierModal')" class="text-slate-400 font-bold">Cancel</button>
                    <button type="submit" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg hover:bg-indigo-700 transition">Save Supplier</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
