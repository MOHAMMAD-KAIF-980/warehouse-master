<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvMaster | Pro Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50">

    <nav class="flex justify-between items-center sticky top-0 z-50 bg-white px-8 py-4 border-b shadow-sm">
        <h1 class="text-2xl font-black text-indigo-600">INV-MASTER</h1>
        <div class="flex gap-6 font-bold text-sm">
            <button onclick="showSection('inventory-section')" class="hover:text-indigo-600">Inventory</button>
            <button onclick="showSection('suppliers-section')" class="hover:text-indigo-600">Suppliers</button>
            <button onclick="exportInventory()" class="bg-emerald-50 text-emerald-600 px-4 py-2 rounded-lg hover:bg-emerald-100 transition">
                <i class="fas fa-file-export mr-2"></i>Export CSV
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="stat-card bg-white p-6 rounded-2xl shadow-sm border-l-8 border-indigo-500">
                <p class="text-xs font-bold text-slate-400 uppercase">Total Items</p>
                <h3 id="stat-total" class="text-3xl font-black">0</h3>
            </div>
            <div class="stat-card bg-white p-6 rounded-2xl shadow-sm border-l-8 border-amber-500">
                <p class="text-xs font-bold text-amber-500 uppercase">Low Stock</p>
                <h3 id="stat-low" class="text-3xl font-black">0</h3>
            </div>
            <div class="stat-card bg-white p-6 rounded-2xl shadow-sm border-l-8 border-red-500">
                <p class="text-xs font-bold text-red-500 uppercase">Out of Stock</p>
                <h3 id="stat-out" class="text-3xl font-black">0</h3>
            </div>
        </div>

        <div id="inventory-section" class="section bg-white p-6 rounded-3xl shadow-sm">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-6">
                <h2 class="text-xl font-black text-slate-800">Live Inventory</h2>
                
                <div class="relative w-full md:w-96">
                    <i class="fas fa-search absolute left-4 top-3 text-slate-400"></i>
                    <input type="text" id="searchInput" onkeyup="searchProducts()" placeholder="Search by name or SKU..." 
                           class="w-full pl-12 pr-4 py-2 bg-slate-100 border-none rounded-2xl outline-none focus:ring-2 focus:ring-indigo-400">
                </div>

                <button onclick="toggleModal('productModal')" class="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-indigo-700">+ Add Product</button>
            </div>
            
            <table class="w-full text-left">
                <thead class="text-xs uppercase text-slate-400 font-bold border-b">
                    <tr>
                        <th class="p-4">Product Details</th>
                        <th class="p-4">SKU ID</th>
                        <th class="p-4 text-center">Tracking (GPS)</th>
                        <th class="p-4 text-center">Price</th>
                        <th class="p-4 text-center">Stock</th>
                        <th class="p-4 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="inventory-table"></tbody>
            </table>
        </div>

        <div id="suppliers-section" class="section hidden bg-white p-6 rounded-3xl shadow-sm">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black text-slate-800">Suppliers</h2>
                <button onclick="toggleModal('supplierModal')" class="bg-slate-900 text-white px-6 py-2 rounded-xl font-bold">+ Add Supplier</button>
            </div>
            <table class="w-full text-left">
                <thead class="text-xs uppercase text-slate-400 font-bold border-b">
                    <tr><th class="p-4">Name</th><th class="p-4">Contact</th><th class="p-4">Category</th><th class="p-4 text-right">Actions</th></tr>
                </thead>
                <tbody id="supplier-table"></tbody>
            </table>
        </div>
    </main>

    <div id="productModal" class="fixed inset-0 hidden flex items-center justify-center z-50 bg-black/50 backdrop-blur-sm">
        <form id="productForm" class="bg-white p-8 rounded-3xl w-96 shadow-2xl">
            <h2 class="text-xl font-bold mb-4">New Entry</h2>
            <input type="text" id="pName" placeholder="Product Name" class="w-full p-3 bg-slate-100 rounded-xl mb-3 outline-none" required>
            <input type="text" id="pType" placeholder="Product Type (Category)" class="w-full p-3 bg-slate-100 rounded-xl mb-3 outline-none" required>
            <div class="flex gap-2 mb-3">
                <input type="text" id="pSku" placeholder="SKU ID" class="w-1/2 p-3 bg-slate-100 rounded-xl outline-none" required>
                <input type="number" id="pPrice" placeholder="Price ($)" class="w-1/2 p-3 bg-slate-100 rounded-xl outline-none" required>
            </div>
            <input type="number" id="pQty" placeholder="Quantity" class="w-full p-3 bg-slate-100 rounded-xl mb-4 outline-none" required>
            <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">Save Data</button>
            <button type="button" onclick="toggleModal('productModal')" class="w-full mt-2 text-slate-400 text-sm font-bold">Cancel</button>
        </form>
    </div>

    <div id="supplierModal" class="fixed inset-0 hidden flex items-center justify-center z-50 bg-black/50 backdrop-blur-sm">
        <form id="supplierForm" class="bg-white p-8 rounded-3xl w-96 shadow-2xl">
            <h2 class="text-xl font-bold mb-4">New Supplier</h2>
            <input type="text" id="sName" placeholder="Supplier Name" class="w-full p-3 bg-slate-100 rounded-xl mb-3 outline-none" required>
            <input type="text" id="sContact" placeholder="Contact Info" class="w-full p-3 bg-slate-100 rounded-xl mb-3 outline-none" required>
            <input type="text" id="sCat" placeholder="Category" class="w-full p-3 bg-slate-100 rounded-xl mb-4 outline-none" required>
            <button type="submit" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold">Register</button>
            <button type="button" onclick="toggleModal('supplierModal')" class="w-full mt-2 text-slate-400 text-sm font-bold">Cancel</button>
        </form>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
